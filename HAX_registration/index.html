<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <body>
    <div class="container">
        <div class="form-section">
            <div class="form-content">
                <h1 class="form-title">Регистрация на участие</h1>

                <form class="registration-form">
                    <div class="input-group">
                        <input type="text" class="form-input" placeholder="ФИО" required>
                    </div>

                    <div class="input-group">
                        <input type="email" class="form-input" placeholder="email" required>
                    </div>

                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" class="checkbox-input" required>
                            <span class="checkbox-custom"></span>
                            <span class="checkbox-text">
                                Я <span class="highlight">принимаю</span> <a href="">пользовательское соглашение и обработку персональных данных.</a>
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="submit-btn">Зарегистрироваться</button>
                </form>
            </div>
        </div>

        <div class="image-section">
            <button class="close-btn">×</button>
            <div class="image-overlay"></div>
            <img src="./resourses/sasha.png" alt="Art" class="hero-image">
            <span class="artist-credit">Саша Алексеенко</span>
        </div>
    </div>
</body>
</html>
